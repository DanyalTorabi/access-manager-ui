name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"   # bump to 20 when dev environment upgrades
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  type-check:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
      - run: npm ci
      - run: npx tsc -b --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 3

  docker:
    name: Docker smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker compose build
      - name: Start container
        run: docker compose up -d
      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf --max-time 5 http://localhost:3000 > /dev/null; then
              echo "App is ready"; exit 0
            fi
            echo "Attempt $i/30 — waiting…"; sleep 2
          done
          echo "App did not become ready in time"
          docker compose logs
          exit 1
      - name: Stop container
        if: always()
        run: docker compose down --remove-orphans

  publish:
    name: Publish to GHCR
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [lint, type-check, build, docker]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/access-manager-ui:latest
            ghcr.io/${{ github.repository_owner }}/access-manager-ui:sha-${{ github.sha }}
